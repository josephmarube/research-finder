events { worker_connections 1024; }

http {
    upstream research_backend {
        server WEB01_IP:5000 max_fails=3 fail_timeout=30s;
        server WEB02_IP:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    log_format main '$remote_addr [$time_local] "$request" $status upstream=$upstream_addr';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass         http://research_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}
