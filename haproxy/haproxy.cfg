#-----------------------------------------------------------------------
# HAProxy Load Balancer Configuration — Lb01
# Domain: youngjmatrix.tech
# Distributes HTTPS traffic between Web01 and Web02
#-----------------------------------------------------------------------

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client 50000
    timeout server 50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

#-----------------------------------------------------------------------
# Frontend: HTTP — redirect all traffic to HTTPS bare domain
#-----------------------------------------------------------------------
frontend http_front
    bind *:80
    mode http
    http-request redirect location https://youngjmatrix.tech%[capture.req.uri] code 301

#-----------------------------------------------------------------------
# Frontend: HTTPS — SSL termination for www and bare domain
#-----------------------------------------------------------------------
frontend https_front
    bind *:443 ssl crt /etc/haproxy/certs/youngjmatrix.tech.pem crt /etc/haproxy/certs/www.youngjmatrix.tech.pem
    mode http
    acl is_www hdr(host) -i www.youngjmatrix.tech
    http-request redirect location https://youngjmatrix.tech%[capture.req.uri] code 301 if is_www
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"
    default_backend web_servers

#-----------------------------------------------------------------------
# Backend: round-robin across Web01 and Web02
# Active health checks via GET /health
#-----------------------------------------------------------------------
backend web_servers
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    timeout connect 5000ms
    timeout server 50000ms
    server web-01 52.207.212.145:5000 check
    server web-02 3.84.26.60:5000 check
